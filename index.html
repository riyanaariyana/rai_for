<!DOCTYPE html>
<html lang="FR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransLogix Solutions - Professional Transportation & Logistics</title>
    <meta name="description" content="Reliable transportation and logistics contracting services.">
    
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= NAV ================= -->
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Logo" class="logo">
        </div>

        <ul class="nav-menu">
            <li><a href="#home" class="nav-link">Home</a></li>
            <li><a href="#services" class="nav-link">Services</a></li>
            <li><a href="#about" class="nav-link">About</a></li>
            <li><a href="#fleet" class="nav-link">Fleet</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
        </ul>

        <div class="hamburger">
            <span></span><span></span><span></span>
        </div>
    </div>
</nav>

<!-- ================= HERO ================= -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Solutions fiables de transport et de logistique</h1>
        <p>Votre partenaire de confiance pour le transport.</p>
    </div>
</section>

<!-- ================= CONTACT ================= -->
<section id="contact" class="contact">
    <div class="container">

        <h2>Contactez-nous</h2>

        <form id="quoteForm">

            <input type="text" name="from_name" placeholder="Votre nom" required>
            <input type="email" name="from_email" placeholder="Votre e-mail" required>
            <input type="text" name="company" placeholder="Entreprise">
            <input type="tel" name="phone" placeholder="Téléphone">

            <textarea name="message" placeholder="Votre message..." required></textarea>

            <button type="submit">Envoyer</button>

        </form>

    </div>
</section>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2024 TransLogix Solutions</p>
</footer>

<!-- ✅ EmailJS (لازم يكون قبل script.js) -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- ✅ ملف الجافاسكريبت -->
<script src="script.js"></script>

</body>
</html>
